name: CI Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Ensure concurrent runs on the same branch cancel previous runs to save CI resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            pkg-config \
            libfontconfig1-dev \
            libfreetype6-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcursor-dev \
            libxi-dev \
            libvulkan1 \
            mesa-vulkan-drivers \
            patchelf \
            libc++-dev \
            libc++abi-dev

      - name: Cache Zig toolchain
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: .tools/zig
          key: ${{ runner.os }}-zig-${{ hashFiles('tools/linux/ensure-zig.sh') }}

      - name: Install Zig toolchain
        run: |
          chmod +x tools/linux/ensure-zig.sh
          ./tools/linux/ensure-zig.sh
          # Add local Zig binary to GitHub Actions PATH
          echo "$(pwd)/.tools/zig/toolchain" >> $GITHUB_PATH

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup patches
        run: |
          chmod +x tools/setup-patches.sh
          ./tools/setup-patches.sh

      - name: Cargo check
        run: cargo check

      - name: Cargo test
        run: cargo test

      - name: Build production bundle
        run: |
          chmod +x tools/linux/build-production.sh
          ./tools/linux/build-production.sh
