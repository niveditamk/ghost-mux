name: CI Build & Release

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

# Ensure concurrent runs on the same branch cancel previous runs to save CI resources
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ghost-mux-linux-x86_64.tar.gz
          - os: macos-latest
            artifact_name: ghost-mux-macos-arm64.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libssl-dev \
            pkg-config \
            libfontconfig1-dev \
            libfreetype6-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libxcursor-dev \
            libxi-dev \
            libvulkan1 \
            mesa-vulkan-drivers \
            patchelf \
            libc++-dev \
            libc++abi-dev

      - name: Cache Zig toolchain
        id: cache-zig
        uses: actions/cache@v4
        with:
          path: .tools/zig
          key: ${{ runner.os }}-zig-${{ hashFiles('tools/linux/ensure-zig.sh') }}

      - name: Install Zig toolchain
        run: |
          chmod +x tools/linux/ensure-zig.sh
          ./tools/linux/ensure-zig.sh
          # Add local Zig binary to GitHub Actions PATH
          echo "$(pwd)/.tools/zig/toolchain" >> $GITHUB_PATH

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Setup patches
        run: |
          chmod +x tools/setup-patches.sh
          ./tools/setup-patches.sh

      - name: Cargo check
        run: cargo check

      - name: Cargo test
        run: cargo test

      - name: Build production bundle
        run: |
          chmod +x tools/linux/build-production.sh
          ./tools/linux/build-production.sh

      - name: Package bundle (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          tar -czf ../ghost-mux-linux-x86_64.tar.gz ghost-mux

      - name: Package bundle (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          tar -czf ../ghost-mux-macos-arm64.tar.gz ghost-mux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghost-mux-${{ matrix.os }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: ghost-mux-*
          path: dist-release
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -lh dist-release

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
